<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#163f46"><title>AP Genshin Impact Digital Exam</title><style>body{margin:0;font-family:system-ui;background:#eef3f8;color:#132238;display:grid;place-items:center;min-height:100vh}main{background:white;padding:28px;border-radius:18px;box-shadow:0 10px 35px #0002;text-align:center;max-width:420px}.spin{width:42px;height:42px;border:5px solid #d6e2ec;border-top-color:#245f69;border-radius:50%;animation:s 1s linear infinite;margin:0 auto 18px}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><main><div class="spin"></div><h2>Loading AP Genshin Exam…</h2><p>Please keep this tab open.</p></main><script>(async()=>{try{const files=['data/part0.txt','data/part1.txt','data/part2.txt'];const parts=await Promise.all(files.map(x=>fetch(x).then(r=>{if(!r.ok)throw Error(x);return r.text()})));const b=Uint8Array.from(atob(parts.join('')),c=>c.charCodeAt(0));const html=await new Response(new Blob([b]).stream().pipeThrough(new DecompressionStream('gzip'))).text();document.open();document.write(html);document.close()}catch(e){document.querySelector('main').innerHTML='<h2>Could not load the exam</h2><p>Refresh the page or open it in the latest Safari or Chrome.</p>'}})();</script></body></html>
